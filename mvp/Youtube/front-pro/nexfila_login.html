<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexfila — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1: #0d0d1a; --bg2: #1a1a2e; --bg3: #0f172a;
    --purple: #4F46E5; --cyan: #06B6D4;
    --purple-light: #818CF8; --purple-pale: #C7D2FE;
    --white: #FFFFFF; --muted: rgba(255,255,255,0.45);
    --border: rgba(79,70,229,0.35);
    --input-bg: rgba(255,255,255,0.04);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg1);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated background */
  .bg-anim {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(79,70,229,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 70%, rgba(6,182,212,0.12) 0%, transparent 60%),
      var(--bg1);
  }

  /* Stars */
  .stars { position:fixed; inset:0; z-index:0; pointer-events:none; }
  .star {
    position:absolute; background:#fff; border-radius:50%;
    animation: twinkle 3s infinite alternate;
  }
  @keyframes twinkle { from{opacity:.2} to{opacity:.8} }

  /* Circuit lines */
  .circuit { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.06; }

  /* Floating particles */
  .particles { position:fixed; inset:0; z-index:0; pointer-events:none; }
  .particle {
    position:absolute; width:3px; height:3px;
    background: var(--cyan); border-radius:50%;
    animation: float-up linear infinite;
    opacity:0;
  }
  @keyframes float-up {
    0%   { transform:translateY(100vh) scale(0); opacity:0; }
    10%  { opacity:.6; }
    90%  { opacity:.3; }
    100% { transform:translateY(-10vh) scale(1); opacity:0; }
  }

  /* Card */
  .card {
    position: relative; z-index: 10;
    width: 440px;
    background: rgba(26,26,46,0.85);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem 2.5rem;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(79,70,229,0.15), 0 0 120px rgba(6,182,212,0.05);
    animation: card-in 0.6s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes card-in {
    from { opacity:0; transform:translateY(30px) scale(.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  /* Top accent line */
  .card::before {
    content:'';
    position:absolute; top:0; left:10%; right:10%; height:2px;
    background: linear-gradient(90deg, transparent, var(--purple), var(--cyan), transparent);
    border-radius:2px;
  }

  /* Logo */
  .logo-wrap {
    text-align:center; margin-bottom:2rem;
    animation: fade-up .6s .1s both;
  }
  .logo-icon {
    width:64px; height:64px; margin:0 auto 1rem;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    border-radius:16px;
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
    box-shadow: 0 0 30px rgba(79,70,229,0.4);
  }
  .logo-title {
    font-family:'Orbitron', sans-serif;
    font-size:1.6rem; font-weight:900;
    letter-spacing:4px; color:var(--white);
  }
  .logo-sub {
    font-size:.8rem; color:var(--cyan);
    letter-spacing:6px; font-weight:300;
    margin-top:.3rem;
  }

  /* Divider */
  .divider {
    display:flex; align-items:center; gap:1rem;
    margin-bottom:1.8rem;
    animation: fade-up .6s .2s both;
  }
  .divider-line { flex:1; height:1px; background:var(--border); }
  .divider-text { font-size:.75rem; color:var(--muted); letter-spacing:2px; }

  /* Form */
  .form-group {
    margin-bottom:1.2rem;
    animation: fade-up .6s both;
  }
  .form-group:nth-child(1) { animation-delay:.25s; }
  .form-group:nth-child(2) { animation-delay:.3s; }
  .form-group:nth-child(3) { animation-delay:.35s; }

  label {
    display:block; font-size:.78rem; font-weight:600;
    color:var(--purple-light); letter-spacing:2px;
    margin-bottom:.5rem; text-transform:uppercase;
  }

  .input-wrap { position:relative; }
  .input-icon {
    position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:16px; pointer-events:none;
  }

  input {
    width:100%; padding:.85rem 1rem .85rem 2.8rem;
    background:var(--input-bg);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--white); font-family:'Exo 2',sans-serif; font-size:.95rem;
    outline:none; transition:all .25s;
  }
  input:focus {
    border-color:var(--cyan);
    background:rgba(6,182,212,0.05);
    box-shadow:0 0 0 3px rgba(6,182,212,0.12);
  }
  input::placeholder { color:var(--muted); }

  /* Select perfil */
  select {
    width:100%; padding:.85rem 1rem .85rem 2.8rem;
    background:var(--input-bg);
    border:1px solid var(--border);
    border-radius:10px;
    color:var(--white); font-family:'Exo 2',sans-serif; font-size:.95rem;
    outline:none; transition:all .25s; cursor:pointer;
    appearance:none;
  }
  select:focus {
    border-color:var(--cyan);
    box-shadow:0 0 0 3px rgba(6,182,212,0.12);
  }
  select option { background:#1a1a2e; color:#fff; }

  /* Button */
  .btn {
    width:100%; padding:1rem;
    background:linear-gradient(135deg, var(--purple), var(--cyan));
    border:none; border-radius:10px;
    color:#fff; font-family:'Orbitron',sans-serif;
    font-size:.9rem; font-weight:700; letter-spacing:3px;
    cursor:pointer; position:relative; overflow:hidden;
    transition:all .3s; margin-top:.5rem;
    animation: fade-up .6s .4s both;
  }
  .btn::before {
    content:''; position:absolute;
    top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
    transition:left .5s;
  }
  .btn:hover::before { left:100%; }
  .btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(6,182,212,0.35); }
  .btn:active { transform:translateY(0); }

  /* Footer text */
  .card-footer {
    text-align:center; margin-top:1.5rem;
    font-size:.78rem; color:var(--muted);
    animation: fade-up .6s .5s both;
  }
  .card-footer span { color:var(--cyan); font-weight:600; }

  @keyframes fade-up {
    from { opacity:0; transform:translateY(12px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>
<div class="bg-anim"></div>
<div class="stars" id="stars"></div>
<div class="particles" id="particles"></div>

<svg class="circuit" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <line x1="0" y1="300" x2="1440" y2="300" stroke="#06B6D4" stroke-width="1"/>
  <line x1="0" y1="600" x2="1440" y2="600" stroke="#4F46E5" stroke-width="1"/>
  <line x1="360" y1="0" x2="360" y2="900" stroke="#06B6D4" stroke-width="1"/>
  <line x1="1080" y1="0" x2="1080" y2="900" stroke="#4F46E5" stroke-width="1"/>
  <circle cx="360" cy="300" r="5" fill="none" stroke="#06B6D4" stroke-width="2"/>
  <circle cx="1080" cy="600" r="5" fill="none" stroke="#4F46E5" stroke-width="2"/>
  <path d="M360 300 L200 300 L200 200" fill="none" stroke="#06B6D4" stroke-width="1"/>
  <path d="M1080 600 L1240 600 L1240 700" fill="none" stroke="#4F46E5" stroke-width="1"/>
</svg>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-icon">🚀</div>
    <div class="logo-title">NEXFILA</div>
    <div class="logo-sub">FILA DE ATENDIMENTO</div>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">ACESSO AO SISTEMA</div>
    <div class="divider-line"></div>
  </div>

  <div class="form-group">
    <label>E-mail</label>
    <div class="input-wrap">
      <span class="input-icon">✉</span>
      <input type="email" placeholder="seu@email.com"/>
    </div>
  </div>

  <div class="form-group">
    <label>Senha</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" placeholder="••••••••"/>
    </div>
  </div>

  <div class="form-group">
    <label>Perfil de Acesso</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <select>
        <option value="">Selecione o perfil</option>
        <option>Administrador</option>
        <option>Atendente</option>
      </select>
    </div>
  </div>

  <button class="btn">ENTRAR NO SISTEMA</button>

  <div class="card-footer">
    Sistema de Fila Prioritária • <span>Lei 10.048/2000</span>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s;`;
    starsEl.appendChild(s);
  }
  // Particles
  const pEl=document.getElementById('particles');
  for(let i=0;i<15;i++){
    const p=document.createElement('div'); p.className='particle';
    p.style.cssText=`left:${Math.random()*100}%;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*8}s;`;
    pEl.appendChild(p);
  }
</script>
</body>
</html>
